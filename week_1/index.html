<!DOCTYPE html>
<html lang="en">

<head>
    <title>Coeliac Compass</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Alkatra:wght@700&family=Inter:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
</head>

<body>
    <header class="global-header">
        <nav class="navbar">
            <div class="logo">
                <span class="material-symbols-outlined plane-icon">flightsmode</span>
                <h1 class="logo-text">Coeliac Compass</h1>
            </div>
            <ul class="nav-links">
                <li><a href="#">Explore</a></li>
                <li><a href="#">Allergy Card</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-container">
                <div class="hero-text">
                    <h1>Travel Without Hesitation</h1>
                    <p>Explore the world without the stress of finding a gluten free meal</p>
                </div>

                <div class="search-pill">
                    <div class="search-group">
                        <span class="material-symbols-outlined">search</span>
                        <div class="input-wrapper">
                            <label>Destination</label>
                            <input type="text" placeholder="Type a city, country ...">
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="search-group">
                        <span class="material-symbols-outlined">calendar_today</span>
                        <div class="input-wrapper">
                            <label>Dates</label>
                            <input type="text" placeholder="Pick your travel dates">
                        </div>
                    </div>

                    <div class="divider"></div>

                    <div class="search-group">
                        <span class="material-symbols-outlined">restaurant</span>
                        <div class="input-wrapper">
                            <label>Dietary Strictness</label>
                            <input type="text" placeholder="Gluten free, Low Gluten">
                        </div>
                    </div>

                    <button class="search-submit">
                        <span class="material-symbols-outlined">search</span>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <footer class="global-footer">
        <div class="footer-content">
            <p>Copyright &copy;2026 · Coeliac Compass</p>
        </div>
    </footer>


</body>

</html>
